# Smoke test: 3 shards, 1 epoch, no wandb.
dataset_dir: "training/datasets/dataset_0009_brush_sweep_diverse/shards"
shard_path: ""
max_shards: 3
output_dir: "training/runs/action_trajectory_smoke"
normalization_stats_path: "training/cfg/normalization_stats_action_trajectory_brush_sweep_diverse_smoke.json"

epochs: 1
batch_size: 32
lr: 0.0005
action_expert_lr: 0.0005
label_proj_lr: 0.0005
weight_decay: 0.00005
eval_every_epochs: 1
checkpoint_every_epochs: 1
log_every_steps: 5
metrics_log_every_steps: 5
device: "cuda"
seed: 7
num_workers: 2
use_amp: false
run_tag: "smoke"
train_fraction: 0.90
val_fraction: 0.05

clip_model_id: "openai/clip-vit-base-patch32"
hf_cache_dir: "/home/ubuntu/.cache/huggingface"
local_files_only: false

d_model: 512
num_heads: 8
num_layers: 4
ffn_multiplier: 4
action_dropout: 0.0
pos_norm_denom: 1.0

integration_steps: 30
inference_samples: 2

table_label: "table surface center"
table_xyz_world: [0.0, 0.0, 0.53]

explode_instruction_variants: false
normalization_eps: 1.0e-8

use_wandb: false
wandb_project: ""
wandb_entity: ""
wandb_group: ""
wandb_run_name: ""
wandb_tags: []
wandb_notes: ""
wandb_prediction_num_examples: 0

cosine_warmup_steps: 10
