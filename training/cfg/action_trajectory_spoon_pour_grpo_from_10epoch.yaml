# GRPO sim fine-tuning of the spoon scoop-and-pour VLA from the 10-epoch
# dataset_0013 pretrain (spoon_sim_vla_0001).
# Smoke test:
#   conda run -n policy_exec --no-capture-output python -m training.action_trajectory_rl.train_grpo \
#     --config training/cfg/action_trajectory_spoon_pour_grpo_from_10epoch.yaml \
#     --num_iterations 1 --num_scenes 2 --group_size 2
# Full run:
#   conda run -n policy_exec --no-capture-output python -m training.action_trajectory_rl.train_grpo \
#     --config training/cfg/action_trajectory_spoon_pour_grpo_from_10epoch.yaml

config: "training/cfg/action_trajectory_spoon_pour_reactive_10epoch.yaml"
checkpoint: "training/runs/action_trajectory/run_0022/checkpoint_epoch_0010.pt"
normalization_stats_path: "training/cfg/normalization_stats_action_trajectory_spoon_pour_reactive.json"

policy_exec_config: "policy_exec/pretrained_policy/config.yaml"
policy_exec_checkpoint: "policy_exec/pretrained_policy/model.pth"
control_frame: "generative_str_pipeline/assets/object_control_points/spoon_spatula.json"

task_type: "spoon_pour"
object_name: "spoon_spatula"
tool_obj_path: "policy_exec/assets/urdf/dextoolbench/spatula/spoon_spatula/spoon_spatula.obj"

output_dir: "training/runs/action_trajectory_grpo"

num_iterations: 2500
num_scenes: 8
group_size: 4
integration_steps: 30
sde_sigma: 0.02
grpo_clip: 0.2
kl_coef: 0.01
inner_epochs: 2
lr: 0.00005
steps_per_segment: 1
lift_z: 0.0
z_offset: 0.0
max_rollout_steps: 900
reward_rollout_repeats: 4
seed: 0

# Pour reward: material poured into the goal region and settled on the table.
reward_w_pour: 1.0
pour_settle_tol_m: 0.03
pour_material_half_z_m: 0.009
pour_partial_scale: 0.8
goal_region_radius_m: 0.05
material_radius_m: 0.02
off_table_drop_m: 0.10
off_table_penalty: 1.0

skip_sim: false
headless: true

use_wandb: true
wandb_project: "generative-str-action-expert"
wandb_entity: ""
wandb_group: "grpo_spoon_pour_sim"
wandb_run_name: "spoon_sim_VLA_0001"
wandb_run_prefix: "spoon_sim_VLA"

use_closed_loop: true
closed_loop_chunk_size: 5
closed_loop_max_replans: 30
closed_loop_max_steps_per_chunk: 200
closed_loop_max_total_steps: 3000
closed_loop_max_stall_replans: 3

wandb_tags: ["dataset_0013", "spoon", "pour", "scoop", "reactive", "closed_loop", "10epoch_pretrain"]
wandb_notes: "GRPO spoon scoop-and-pour from 10-epoch dataset_0013 pretrain; closed-loop execute-5-of-15, train in sim."

video_every: 10
video_capture_interval: 4
video_fps: 15
video_num_envs: 8
