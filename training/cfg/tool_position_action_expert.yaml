# dataset_0007: one instruction per shard row (~907k). Keep explode=false (no second expansion).
dataset_dir: "/home/ubuntu/Generative_STR/training/datasets/dataset_0007/shards"
output_dir: "training/runs/tool_position_action_expert"

# Training
epochs: 40
batch_size: 8
gradient_accumulation_steps: 4
cosine_warmup_steps: 500
lr: 0.00005
weight_decay: 0.0001
lora_lr: 1.0e-5
action_expert_lr: 1.0e-4
label_proj_lr: 1.0e-4
label_proj_weight_decay: 0.0005
resume_checkpoint_path: "training/runs/tool_position_action_expert/run_0047/checkpoint_step_0003000.pt"
# Resume-only: cosine tail for label_proj + action_expert (optimizer steps from loaded state).
action_expert_cosine_T_max_steps: 3000
action_expert_cosine_eta_min: 1.0e-5
# Resume-only: cosine tail for LoRA (optimizer steps from loaded state).
lora_cosine_T_max_steps: 10000
lora_cosine_eta_min: 2.0e-6
bad_batch_loss_threshold: 50.0
bad_batch_grad_norm_threshold: 100.0
bad_batch_abort_after_step: 300
bad_batch_max_retries_per_step: 5
eval_every_epochs: 1
checkpoint_every_epochs: 5
log_every_steps: 10
metrics_log_every_steps: 10

# Runtime
device: "cuda"
seed: 7
num_workers: 4
use_amp: true
image_size: 224
train_fraction: 0.85
val_fraction: 0.10

# PaliGemma + LoRA
paligemma_model_id: "google/paligemma-3b-pt-224"
hf_cache_dir: "/home/ubuntu/.cache/huggingface"
local_files_only: false
enable_gradient_checkpointing: true
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

# Action expert
d_model: 1024
num_heads: 8
num_action_expert_layers: 6
ffn_multiplier: 4
action_dropout: 0.1
pos_norm_denom: 1.0
max_keypoints: 30
explode_instruction_variants: false

# Deterministic rejection-sampled goal inside region (per instruction variant seed).
sample_goal_in_constraint_region: true
goal_rejection_sample_max_attempts: 512

# Flow matching / inference
integration_steps: 50
inference_samples: 16

# Constraint filtering (quality + inference filtering, not training loss)
filter_invalid_train_examples: true
invalid_sample_weight: 0.25
z_min_offset_m: -0.02
z_max_offset_m: 0.20
above_xy_min_m: 0.025
above_xy_max_m: 0.05
near_xy_min_m: 0.075
near_xy_max_m: 0.10
directional_axis_min_m: 0.075
directional_axis_max_m: 0.10
directional_lateral_tol_m: 0.03
between_midpoint_fraction_of_span: 0.40
exact_above_xy_radius_m: 0.01

system_prompt: "You are a robot control assistant that grounds instructions in the image and object labels."

# Global XYZ mean/std — use stats computed on the same shard set as `dataset_dir`.
normalization_stats_path: "training/cfg/normalization_stats_dataset_0007.json"
normalization_eps: 1.0e-8

# Weights & Biases (`pip install wandb`, `wandb login` or WANDB_API_KEY)
use_wandb: true
wandb_project: "generative-str-action-expert"
wandb_entity: ""
wandb_group: ""
wandb_run_name: ""
wandb_tags: []
wandb_notes: ""
wandb_prediction_log_every_steps: 400
wandb_prediction_num_examples: 8

